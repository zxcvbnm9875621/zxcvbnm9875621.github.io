<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f1f3f5;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 24px;
    border-radius: 999px;
    color: white;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    border: none;
    cursor: pointer;
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }
  .btn svg {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .google    { background: #fff; color: #202124; border: 1px solid #dadce0; }
  .bing      { background: #0078d4; }
  .apple     { background: #f5f5f7; color: #1d1d1f; }
  .github    { background: #0d1117; }
  .coolapk   { background: #00b5e5; }
  .bilibili  { background: #fb7299; }
  .douyin    { background: #000000; }
  .steam     { background: #1b2838; }

  .footer {
    margin-top: 30px;
    font-size: 14px;
    color: #888;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">

<a href="https://google.com" target="_blank" class="btn google">
